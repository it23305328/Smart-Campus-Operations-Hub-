spring.application.name=Smart Campus Hub
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smartcampus?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Google OAuth2 Config 
# Replace these with real credentials via ENV variables
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:some-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:some-secret}
spring.security.oauth2.client.registration.google.scope=profile, email
